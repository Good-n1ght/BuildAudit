<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Debug</title></head>
<body style="background:#1a1a2e;color:#eee;font-family:sans-serif;padding:20px;">
<h2>Diagnostic Page</h2>
<pre id="log" style="background:#111;padding:15px;border-radius:8px;color:#0f0;font-size:14px;white-space:pre-wrap;max-height:80vh;overflow-y:auto;"></pre>
<script>
var log = document.getElementById('log');
function L(s) { log.textContent += s + '\n'; }

L('1. Page loaded');
L('2. Script executing');
L('3. About to fetch data.json...');

var t0 = performance.now();
fetch('data.json')
  .then(function(r) {
    L('4. Response received: status=' + r.status + ' size=' + r.headers.get('content-length') + ' time=' + (performance.now()-t0).toFixed(0) + 'ms');
    return r.json();
  })
  .then(function(data) {
    L('5. JSON parsed OK. Categories: ' + Object.keys(data).join(', '));
    L('6. CPU count: ' + data.cpu.length);
    L('7. GPU count: ' + (data.gpu||[]).length);
    L('8. Motherboard count: ' + (data.motherboard||[]).length);
    L('=== ALL OK - data loading works! ===');
  })
  .catch(function(e) {
    L('ERROR: ' + e.message + ' (type=' + e.name + ')');
  });
</script>
</body></html>
