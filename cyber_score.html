<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>赛博跑分 - PC硬件搭配评分 8大件</title>
<style>
:root {--bg:#1a1a2e; --card:#16213e; --accent:#00d4aa; --warn:#ff6b6b; --gold:#f0c040; --text:#e0e0e0; --dim:#8899aa; --border:#2a2a4a; --input-bg:#0f0f23; --orange:#ff8c42;}
* {margin:0; padding:0; box-sizing:border-box}
body {font-family:'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif; background:var(--bg); color:var(--text); line-height:1.6; min-height:100vh}
.container {max-width:900px; margin:0 auto; padding:20px}
h1 {text-align:center; color:var(--accent); font-size:1.8em; margin:20px 0 10px; letter-spacing:2px}
.subtitle {text-align:center; color:var(--dim); font-size:0.85em; margin-bottom:30px}
.version {text-align:center; color:var(--dim); font-size:0.7em; margin-top:-20px; margin-bottom:20px}

.strategy-bar {display:flex; gap:8px; justify-content:center; margin-bottom:25px; flex-wrap:wrap}
.strategy-btn {padding:8px 20px; border:1px solid var(--border); border-radius:6px; background:var(--input-bg); color:var(--dim); cursor:pointer; font-size:0.9em; transition:all .2s}
.strategy-btn.active {border-color:var(--accent); color:var(--accent); background:#0a2a20}
.strategy-btn:hover {border-color:var(--accent)}

.config-section {background:var(--card); border-radius:10px; padding:16px; margin-bottom:12px; border:1px solid var(--border)}
.config-section h3 {font-size:0.95em; color:var(--accent); margin-bottom:10px; display:flex; align-items:center; gap:8px}
.config-section h3 .tag {font-size:0.7em; background:var(--accent); color:var(--bg); padding:2px 8px; border-radius:10px; white-space:nowrap}

.search-wrapper {position:relative}
.search-input {width:100%; padding:10px 14px; background:var(--input-bg); border:1px solid var(--border); border-radius:6px; color:var(--text); font-size:0.9em; outline:none; transition:border .2s}
.search-input:focus {border-color:var(--accent)}
.search-input::placeholder {color:var(--dim); font-size:0.82em}

.dropdown {display:none; position:absolute; top:100%; left:0; right:0; background:var(--input-bg); border:1px solid var(--accent); border-radius:0 0 6px 6px; max-height:220px; overflow-y:auto; z-index:100; margin-top:2px}
.dropdown.active {display:block}
.dropdown-item {padding:8px 14px; cursor:pointer; font-size:0.88em; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center}
.dropdown-item:hover {background:#1a3a2e}
.dropdown-item:last-child {border-bottom:none}
.dropdown-item .alias {color:var(--dim); font-size:0.78em}
.dropdown-item .tag {font-size:0.7em; padding:2px 6px; border-radius:4px}
.dropdown-item .tag.ewaste {background:#5a3030; color:var(--warn)}
.dropdown-item .tag.ok {background:#1a4020; color:var(--accent)}

.selected-tag {display:inline-flex; align-items:center; gap:6px; background:var(--input-bg); border:1px solid var(--accent); padding:4px 12px; border-radius:4px; margin-top:8px; font-size:0.88em}
.selected-tag .remove {cursor:pointer; color:var(--warn); font-weight:bold}

.row-2 {display:grid; grid-template-columns:1fr 1fr; gap:12px}
.row-3 {display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px}

/* 机箱需求卡 */
.case-card {background:#1a1020; border:2px dashed var(--orange); border-radius:8px; padding:14px 18px; margin-bottom:12px}
.case-card h3 {color:var(--orange); font-size:0.95em; margin-bottom:8px; display:flex; align-items:center; gap:8px}
.case-card h3 .tag {font-size:0.7em; background:var(--orange); color:#1a1a2e; padding:2px 8px; border-radius:10px}
.case-card .req-list {list-style:none; padding:0}
.case-card .req-list li {font-size:0.88em; color:var(--text); padding:4px 0; border-bottom:1px solid #2a1a30}
.case-card .req-list li:last-child {border-bottom:none}
.case-card .req-list li .hl {color:var(--warn); font-weight:bold}
.case-card .req-list li .hl2 {color:var(--orange); font-weight:bold}
.case-card .empty-msg {color:var(--dim); font-size:0.82em; font-style:italic}

.btn {display:block; width:100%; padding:14px; background:var(--accent); color:var(--bg); border:none; border-radius:8px; font-size:1.1em; font-weight:bold; cursor:pointer; margin-top:16px; letter-spacing:2px; transition:all .2s}
.btn:hover {opacity:0.9; transform:translateY(-1px)}
.btn:disabled {background:#555; cursor:not-allowed; transform:none}

.result {display:none; margin-top:20px; background:var(--card); border-radius:10px; padding:24px; border:1px solid var(--border)}
.result.show {display:block}

.score-hero {text-align:center; margin-bottom:20px}
.score-num {font-size:4em; font-weight:bold; color:var(--accent); line-height:1}
.score-bar-container {margin-top:10px; height:10px; background:var(--input-bg); border-radius:5px; overflow:hidden}
.score-bar-fill {height:100%; background:linear-gradient(90deg,var(--warn),var(--gold),var(--accent)); border-radius:5px; transition:width .5s}
.score-oneliner {color:var(--dim); font-size:0.9em; margin-top:8px}

.flags {margin-top:16px}
.flag {padding:8px 12px; border-radius:6px; margin-bottom:6px; font-size:0.88em}
.flag.critical {background:#3a1a1a; border-left:3px solid var(--warn); color:var(--warn)}
.flag.warning {background:#3a2a10; border-left:3px solid var(--gold); color:var(--gold)}
.flag-title {font-weight:bold}

.dim-table {width:100%; margin-top:16px; border-collapse:collapse}
.dim-table th {text-align:left; color:var(--dim); font-size:0.8em; padding:6px 8px; border-bottom:1px solid var(--border)}
.dim-table td {padding:8px; border-bottom:1px solid var(--border); font-size:0.88em}
.dim-table .dim-score {color:var(--accent); font-weight:bold; text-align:center}
.dim-table .dim-weight {text-align:center; color:var(--dim); font-size:0.82em}

.list-section {margin-top:12px}
.list-section h4 {color:var(--gold); font-size:0.85em; margin-bottom:4px}
.list-section h4.red {color:var(--warn)}
.list-section h4.green {color:var(--accent)}
.list-item {font-size:0.84em; color:var(--dim); padding:2px 8px}

.ewaste-warn {background:#3a1a1a; border:1px solid var(--warn); border-radius:6px; padding:10px 14px; margin-top:12px; font-size:0.84em; color:var(--warn)}

.footer {text-align:center; color:var(--dim); font-size:0.72em; margin-top:30px; padding-bottom:20px}
</style>
</head>
<body>
<div class="container">
<h1>⚡ 赛 博 跑 分</h1>
<p class="subtitle">PC硬件搭配合理性评分 · 8大件 · 双击打开即用</p>
<p class="version">v1.0 — CPU | 主板 | 显卡 | 内存 | SSD | 散热 | 电源 | 机箱</p>

<div class="strategy-bar" id="strategyBar">
<button class="strategy-btn active" data-s="性价比">💰 性价比</button>
<button class="strategy-btn" data-s="一步到位">🎯 一步到位</button>
<button class="strategy-btn" data-s="面向未来">🚀 面向未来</button>
</div>

<!-- ====== 7大件选择 ====== -->
<div class="config-section">
<h3><span class="tag">CPU</span> 处理器</h3>
<div class="search-wrapper">
<input class="search-input" id="cpuInput" placeholder="输入CPU名称，如：7500F / 9800X3D / i5-13600KF / E5-2666..." autocomplete="off">
<div class="dropdown" id="cpuDropdown"></div>
</div>
<div id="cpuTag"></div>
</div>

<div class="config-section">
<h3><span class="tag">主板</span> 主板</h3>
<div class="search-wrapper">
<input class="search-input" id="mbInput" placeholder="输入主板名称或别名，如：B650M迫击炮 / 重炮手 / 小雕..." autocomplete="off">
<div class="dropdown" id="mbDropdown"></div>
</div>
<div id="mbTag"></div>
</div>

<div class="config-section">
<h3><span class="tag">显卡</span> GPU</h3>
<div class="search-wrapper">
<input class="search-input" id="gpuInput" placeholder="输入显卡名称，如：5060Ti / 4070S / 1080Ti..." autocomplete="off">
<div class="dropdown" id="gpuDropdown"></div>
</div>
<div id="gpuTag"></div>
</div>

<div class="row-2">
<div class="config-section">
<h3><span class="tag">内存</span> 内存</h3>
<div class="search-wrapper">
<input class="search-input" id="memInput" placeholder="如：金士顿 6000 / 光威 3600..." autocomplete="off">
<div class="dropdown" id="memDropdown"></div>
</div>
<div id="memTag"></div>
</div>
<div class="config-section">
<h3><span class="tag">SSD</span> SSD/硬盘</h3>
<div class="search-wrapper">
<input class="search-input" id="ssdInput" placeholder="如：990 PRO / SN850X / 致态..." autocomplete="off">
<div class="dropdown" id="ssdDropdown"></div>
</div>
<div id="ssdTag"></div>
</div>
</div>

<div class="row-2">
<div class="config-section">
<h3><span class="tag">散热</span> 散热器</h3>
<div class="search-wrapper">
<input class="search-input" id="coolerInput" placeholder="如：PA120 / AK620 / 冰堡垒360..." autocomplete="off">
<div class="dropdown" id="coolerDropdown"></div>
</div>
<div id="coolerTag"></div>
</div>
<div class="config-section">
<h3><span class="tag">电源</span> 电源</h3>
<div class="search-wrapper">
<input class="search-input" id="psuInput" placeholder="如：海韵 Focus 750 / 振华 850..." autocomplete="off">
<div class="dropdown" id="psuDropdown"></div>
</div>
<div id="psuTag"></div>
</div>
</div>

<!-- ====== 机箱需求卡 ====== -->
<div class="case-card" id="caseCard">
<h3><span class="tag">机箱</span> 机箱需求自动推导</h3>
<ul class="req-list" id="caseReqs">
<li class="empty-msg">选择CPU/主板/显卡/散热器后，自动生成机箱需求</li>
</ul>
</div>

<button class="btn" id="runBtn" onclick="run()">开 始 评 分</button>

<div class="result" id="result"></div>

<p class="footer">赛博跑分 v1.0 · 8大件评分 · 去品牌滤镜</p>
</div>

}
if (cooler) {
if (cooler.type === '风冷' && cooler.height > 0) {
const h = cooler.height + 5;
html += '<li>散热器限高：需 ≥ <span class="hl2">' + h + 'mm</span>（' + cooler.name + ' 高' + cooler.height + 'mm，建议+5mm余量）</li>';
} else if (cooler.type === '水冷') {
const rad = cooler.height || (cooler.name.includes('360') ? 360 : cooler.name.includes('240') ? 240 : 0);
if (rad) {
html += '<li>冷排支持：需支持<span class="hl2">' + rad + '规格</span>水冷排（' + cooler.name + '）</li>';
} else {
html += '<li>水冷规格：' + cooler.name + ' — 请按冷排尺寸选择机箱</li>';
}
}
}
if (html === '') {
html = '<li class="empty-msg">请选择更多配件以完善机箱需求</li>';
}
list.innerHTML = html;
}

// ============ 评分主函数 ============
function run() {
const strategy = document.querySelector('.strategy-btn.active').dataset.s;
const w = WEIGHTS[strategy];
const cpu = selectedCPU, mb = selectedMB, gpu = selectedGPU;
const mem = selectedMem, ssd = selectedSSD, cooler = selectedCooler, psu = selectedPSU;

if (!cpu || !mb || !gpu) {alert('请至少选择CPU、主板和显卡（核心三件）'); return;}

const redFlags = [], deductions = [], bonuses = [];
let passed = true;

// === 硬兼容性检查 ===
if (cpu.socket !== mb.socket) {
redFlags.push({cat:'接口不匹配',msg:'CPU接口 '+cpu.socket+' 与主板接口 '+mb.socket+' 不兼容',critical:true});
passed = false;
}
const cpuMem = new Set(cpu.memory_type.split('|'));
const mbMem = new Set(mb.memory_type.split('|'));
const compatMem = [...cpuMem].filter(m => mbMem.has(m));
if (!compatMem.length) {
redFlags.push({cat:'内存代数不匹配',msg:'CPU支持'+cpu.memory_type+'，主板支持'+mb.memory_type+'，无交集',critical:true});
passed = false;
}
if (cpu.tdp >= 170 && mb.vrm_quality_score <= 4) {
redFlags.push({cat:'供电不足',msg:cpu.name+' TDP '+cpu.tdp+'W，'+mb.name+' 供电太弱，满载可能降频或烧VRM',critical:false});
} else if (cpu.tdp >= 125 && mb.vrm_quality_score <= 3) {
redFlags.push({cat:'供电不足',msg:cpu.name+' TDP '+cpu.tdp+'W，'+mb.name+' 供电太弱，不建议此搭配',critical:true});
passed = false;
}

// 内存兼容性检查
if (mem) {
const memType = mem.type;
const memOk = compatMem.includes(memType);
if (!memOk) {
redFlags.push({cat:'内存不兼容',msg:'内存类型 '+memType+' 与 CPU/主板不兼容。CPU支持'+cpu.memory_type+'，主板支持'+mb.memory_type, critical:true});
passed = false;
}
}

// 电源瓦数检查
if (psu) {
const totalTDP = cpu.tdp + gpu.tdp + 80;
if (totalTDP / psu.wattage > 0.85) {
redFlags.push({cat:'电源功率不足',msg:'总功耗约'+Math.round(totalTDP)+'W，电源'+psu.wattage+'W仅'+psu.name+'，负载率超85%',critical:false});
}
}

// 散热器检查
if (cooler) {
if (cooler.tdp_cooling < cpu.tdp) {
redFlags.push({cat:'散热不足',msg:cooler.name+'解热能力'+cooler.tdp_cooling+'W < CPU TDP '+cpu.tdp+'W',critical:false});
}
}

if (!passed) {
renderResult({total:0,dims:{},redFlags,deductions:[],bonuses:[],strategy,passed,ewaste:[]});
return;
}

// === 评分计算 ===
const dims = {};

// 1. CPU-GPU匹配
const ct = cpuTier(cpu), gt = gpuTier(gpu);
const gap = Math.abs(ct-gt);
let cgScore, cgDetail;
if(gap===0) {cgScore=95;cgDetail='完美匹配，无明显瓶颈';}
else if(gap===1) {cgScore=78;cgDetail='轻度错配，尚可接受';}
else if(gap===2) {cgScore=55;cgDetail='存在明显瓶颈';}
else {cgScore=30;cgDetail='严重错配('+(ct>gt?'CPU过剩拖后腿':'CPU拖后腿')+')';}
dims.cpu_gpu = {score:cgScore, detail:cgDetail};

// 2. 供电合理性
let pdScore = mb.vrm_quality_score * 10;
let pdBonus = 0;
if(mb.vrm_quality_score>=8 && cpu.tdp<=120) pdBonus=15;
else if(mb.vrm_quality_score>=7 && cpu.tdp<=105) pdBonus=10;
else if(mb.vrm_quality_score>=6 && cpu.tdp<=65) pdBonus=5;
if(mb.vrm_quality_score<=4 && cpu.tdp>=105) pdScore-=20;
pdScore = Math.min(100,Math.max(0,pdScore+pdBonus));
dims.power = {score:pdScore, detail:mb.name+' VRM '+mb.vrm_phases+'相 '+mb.vrm_mos+'MOS'+(pdBonus?' 余量充足(+'+pdBonus+')':' 供电合理')};

// 3. 散热余量
let thScore=50, thDetail='未选散热器，默认及格线';
if (cooler) {
const ratio = cooler.tdp_cooling / cpu.tdp;
if(ratio>=2) {thScore=95;thDetail='余量充足('+ratio.toFixed(1)+'倍)，安静运行';}
else if(ratio>=1.5) {thScore=82;thDetail='余量良好('+ratio.toFixed(1)+'倍)';}
else if(ratio>=1.2) {thScore=65;thDetail='基本够用('+ratio.toFixed(1)+'倍)';}
else if(ratio>=1) {thScore=45;thDetail='勉强压住('+ratio.toFixed(1)+'倍)';}
else {thScore=15;thDetail='散热器压不住CPU('+ratio.toFixed(1)+'倍)';}
}
dims.thermal = {score:thScore, detail:thDetail};

// 4. 升级空间
let upScore = 50;
if(cpu.socket==='AM5') {upScore+=30;bonuses.push({text:'AM5平台支持至2029+，升级路径极佳',cat:'upgrade'});}
else if(cpu.socket==='LGA1851') {upScore+=20;bonuses.push({text:'LGA1851新平台，有升级空间',cat:'upgrade'});}
else if(cpu.socket==='AM4') {upScore+=5;bonuses.push({text:'AM4已末期',cat:'upgrade'});}
else if(cpu.socket.startsWith('LGA2011')) {upScore-=25;}
if(mb.pcie_gen.includes('PCIe5.0')) {upScore+=10;bonuses.push({text:'主板支持PCIe 5.0',cat:'upgrade'});}
else if(mb.pcie_gen.includes('PCIe4.0')) {upScore+=3;bonuses.push({text:'PCIe 4.0够用但非最新',cat:'upgrade'});}
if(mb.memory_slots>=4) {upScore+=5;bonuses.push({text:'4个内存插槽',cat:'upgrade'});}
upScore = Math.min(100,Math.max(0,upScore));
dims.upgrade = {score:upScore, detail: bonuses.filter(b=>b.cat==='upgrade').map(b=>b.text).join(' | ') || '升级空间有限'};

// 5. 电源余量
let psScore=50, psDetail='未选电源';
if (psu) {
const lr = (cpu.tdp+gpu.tdp+80)/psu.wattage;
if(lr<=0.5) {psScore=92;psDetail='余量充足(负载'+(lr*100).toFixed(0)+'%)，'+psu.rating+' '+psu.modular;}
else if(lr<=0.7) {psScore=78;psDetail='余量良好(负载'+(lr*100).toFixed(0)+'%)，'+psu.rating;}
else if(lr<=0.8) {psScore=55;psDetail='负载偏高(负载'+(lr*100).toFixed(0)+'%)';}
else {psScore=25;psDetail='接近满载(负载'+(lr*100).toFixed(0)+'%)';}
}
dims.psu = {score:psScore, detail:psDetail};

// 6. 内存匹配度
let memScore=50, memDetail='未选内存';
if (mem) {
if (mem.type==='DDR5' && mem.frequency>=6000) {memScore=90;memDetail='DDR5高频，性能充分';}
else if (mem.type==='DDR5' && mem.frequency>=5200) {memScore=78;memDetail='DDR5标准频率，够用';}
else if (mem.type==='DDR4' && mem.frequency>=3600) {memScore=80;memDetail='DDR4高频，DDR4天花板';}
else if (mem.type==='DDR4' && mem.frequency>=3200) {memScore=65;memDetail='DDR4标准频率';}
else if (mem.type==='DDR4' && mem.frequency<3200) {memScore=35;memDetail='DDR4低频，影响性能';}
else if (mem.type==='DDR3') {memScore=15;memDetail='DDR3已严重过时';}
if (mem.capacity < 16) {memScore-=15;memDetail+='，容量不足';}
else if (mem.capacity >= 32) {memScore+=5;memDetail+='，大容量';}
dims.mem = {score:Math.min(100,Math.max(0,memScore)), detail:memDetail};
} else {
dims.mem = {score:50, detail:'未选内存，默认及格线'};
}

// 7. SSD存储
let ssdScore=50, ssdDetail='未选SSD';
if (ssd) {
if (ssd.interface.includes('PCIe4.0') && ssd.read>=7000) {ssdScore=95;ssdDetail='PCIe4.0旗舰，读写速度顶级';}
else if (ssd.interface.includes('PCIe4.0') && ssd.read>=4000) {ssdScore=80;ssdDetail='PCIe4.0中端，速度良好';}
else if (ssd.interface.includes('PCIe3.0')) {ssdScore=65;ssdDetail='PCIe3.0，够用但非最新';}
else if (ssd.type==='SATA') {ssdScore=50;ssdDetail='SATA固态，适合仓库';}
else if (ssd.type==='HDD') {ssdScore=30;ssdDetail='机械硬盘，适合冷存储';}
dims.ssd = {score:ssdScore, detail:ssdDetail};
} else {
dims.ssd = {score:50, detail:'未选SSD，默认及格线'};
}

// 8. 参数利用率
let utScore = 60;
if(w.util > 0) {
if(mb.vrm_quality_score>=7 && cpu.tdp>=105) {utScore+=20;bonuses.push({text:mb.name+' 强供电被充分利用',cat:'util'});}
else if(mb.vrm_quality_score>=7 && cpu.tdp<=65) {utScore-=15;deductions.push({text:mb.name+' 供电过剩，主板参数未充分利用',cat:'util'});}
if(mb.pcie_gen.includes('PCIe5.0') && /9000|Arrow/.test(cpu.gen)) {utScore+=10;bonuses.push({text:'PCIe 5.0主板配PCIe 5.0 CPU',cat:'util'});}
if(ssd && ssd.interface.includes('PCIe4.0') && mb.pcie_gen.includes('PCIe4.0')) {utScore+=5;bonuses.push({text:'PCIe 4.0 SSD匹配主板',cat:'util'});}
utScore = Math.min(100,Math.max(0,utScore));
}
dims.util = {score:utScore, detail:'参数利用率 '+utScore+'分'};

// === 加权总分 ===
let total = 0, totalW = 0;
for (const [k,v] of Object.entries(w)) {
if (dims[k]) {total += dims[k].score * v; totalW += v;}
}
total = totalW > 0 ? Math.round(total / totalW * 100) : 0;

// === 洋垃圾检测 ===
const ewaste = [];
if(cpu.is_e_waste) ewaste.push('CPU: '+cpu.name);
if(mb.is_e_waste) ewaste.push('主板: '+mb.name);
if(mem && mem.is_e_waste) ewaste.push('内存: '+mem.name);
if(ssd && ssd.is_e_waste) ewaste.push('SSD: '+ssd.name);
if(cooler && cooler.is_e_waste) ewaste.push('散热器: '+cooler.name);
if(psu && psu.is_e_waste) ewaste.push('电源: '+psu.name);

renderResult({total,dims,w,redFlags,deductions,bonuses,strategy,passed,ewaste});
}

function renderResult(r) {
const div = document.getElementById('result');
div.className='result show';
let html = '';

if(!r.passed) {
html += '<div class="score-hero"><div class="score-num" style="color:var(--warn)">⛔</div>';
html += '<div class="score-oneliner">存在致命兼容性问题，无法继续评分</div></div>';
} else {
const w = r.w;
html += '<div class="score-hero">';
html += '<div class="score-num">'+r.total.toFixed(1)+'</div>';
html += '<div class="score-bar-container"><div class="score-bar-fill" style="width:'+r.total+'%"></div></div>';
const oneliner = r.total>=90?'近乎完美':r.total>=80?'非常合理':r.total>=70?'中规中矩':r.total>=60?'能用但有短板':r.total>=45?'不太合理':'得大改';
html += '<div class="score-oneliner">'+oneliner+' · '+r.strategy+'策略</div></div>';

const labels = {cpu_gpu:'CPU-GPU匹配',power:'供电合理性',thermal:'散热余量',upgrade:'升级空间',psu:'电源余量',mem:'内存匹配',ssd:'SSD存储',util:'参数利用率'};
html += '<table class="dim-table"><tr><th>维度</th><th>得分</th><th>权重</th><th>说明</th></tr>';
for(const [k,v] of Object.entries(r.dims)) {
html += '<tr><td>'+(labels[k]||k)+'</td><td class="dim-score">'+r.dims[k].score+'</td><td class="dim-weight">'+((w[k]||0)*100).toFixed(0)+'%</td><td style="font-size:0.84em;color:var(--dim)">'+r.dims[k].detail+'</td></tr>';
}
html += '</table>';
}

if(r.redFlags.length) {
html += '<div class="flags">';
for(const f of r.redFlags) {
html += '<div class="flag '+(f.critical?'critical':'warning')+'"><span class="flag-title">['+(f.critical?'致命':'警告')+'] '+f.cat+':</span> '+f.msg+'</div>';
}
html += '</div>';
}

if(r.deductions.length) {
html += '<div class="list-section"><h4 class="red">⬇ 降分项</h4>';
for(const d of r.deductions) html += '<div class="list-item">- '+d.text+'</div>';
html += '</div>';
}
if(r.bonuses.length) {
html += '<div class="list-section"><h4 class="green">⬆ 加分项</h4>';
for(const b of r.bonuses) html += '<div class="list-item">+ '+b.text+'</div>';
html += '</div>';
}

if(r.ewaste.length) {
html += '<div class="ewaste-warn">⚠ 该配置包含洋垃圾硬件：'+r.ewaste.join('、')+'</div>';
}

div.innerHTML = html;
div.scrollIntoView({behavior:'smooth'});
}

// ============ 搜索交互 ============
let selectedCPU=null, selectedMB=null, selectedGPU=null;
let selectedMem=null, selectedSSD=null, selectedCooler=null, selectedPSU=null;

function search(list, query, aliases) {
const q = query.toLowerCase().trim();
if (!q) return [];
const results = [];
for (const [alias, name] of Object.entries(aliases)) {
if (alias.includes(q)) {
const item = list.find(i=>i.name===name);
if (item && !results.find(r=>r.item.name===name)) results.push({item, match:alias});
}
}
for (const item of list) {
if (item.name.toLowerCase().includes(q)) {
if (!results.find(r=>r.item.name===item.name)) results.push({item, match:null});
}
}
return results.slice(0, 12);
}

function setupSearch(inputId, dropdownId, tagId, list, aliases, onSelect, onChange) {
const input = document.getElementById(inputId);
const dropdown = document.getElementById(dropdownId);
const tagDiv = document.getElementById(tagId);

input.addEventListener('input', ()=>{
const results = search(list, input.value, aliases);
dropdown.innerHTML = '';
if (results.length && input.value.trim()) {
results.forEach(r=>{
const div = document.createElement('div');
div.className = 'dropdown-item';
const aliasHtml = r.match ? '<span class="alias">← '+r.match+'</span>' : '';
const eTag = r.item.is_e_waste ? '<span class="tag ewaste">洋垃圾</span>' : '<span class="tag ok">✓</span>';
div.innerHTML = '<span>'+r.item.name+' '+eTag+'</span>'+aliasHtml;
div.onclick = ()=>{
onSelect(r.item);
dropdown.classList.remove('active');
input.value='';
updateTag(tagDiv, r.item, ()=>{onSelect(null); input.value=''; input.focus(); if(onChange)onChange();});
if(onChange)onChange();
};
dropdown.appendChild(div);
});
dropdown.classList.add('active');
} else {
dropdown.classList.remove('active');
}
});

input.addEventListener('blur', ()=>{
setTimeout(()=>dropdown.classList.remove('active'), 200);
});
input.addEventListener('focus', ()=>{
if (input.value.trim() && dropdown.children.length) dropdown.classList.add('active');
});
}

function updateTag(tagDiv, item, onRemove) {
tagDiv.innerHTML = '';
if (!item) return;
const tag = document.createElement('span');
tag.className = 'selected-tag';
let t = item.name;
if (item.is_e_waste) t += ' ⚠洋垃圾';
tag.innerHTML = t+' <span class="remove" onclick="event.stopPropagation()">✕</span>';
tag.querySelector('.remove').onclick = onRemove;
tagDiv.appendChild(tag);
}

// 初始化所有搜索
setupSearch('cpuInput','cpuDropdown','cpuTag', DB.cpu, ALIASES.cpu, (item)=>{selectedCPU=item;updateCaseReqs();}, ()=>updateCaseReqs());
setupSearch('mbInput','mbDropdown','mbTag', DB.motherboard, ALIASES.motherboard, (item)=>{selectedMB=item;updateCaseReqs();}, ()=>updateCaseReqs());
setupSearch('gpuInput','gpuDropdown','gpuTag', DB.gpu, ALIASES.gpu, (item)=>{selectedGPU=item;updateCaseReqs();}, ()=>updateCaseReqs());
setupSearch('memInput','memDropdown','memTag', DB.memory, ALIASES.memory, (item)=>{selectedMem=item;}, null);
setupSearch('ssdInput','ssdDropdown','ssdTag', DB.ssd, ALIASES.ssd, (item)=>{selectedSSD=item;}, null);
setupSearch('coolerInput','coolerDropdown','coolerTag', DB.cooler, ALIASES.cooler, (item)=>{selectedCooler=item;updateCaseReqs();}, ()=>updateCaseReqs());
setupSearch('psuInput','psuDropdown','psuTag', DB.psu, ALIASES.psu, (item)=>{selectedPSU=item;}, null);

// 策略按钮
document.querySelectorAll('.strategy-btn').forEach(btn=>{
btn.addEventListener('click', ()=>{
document.querySelectorAll('.strategy-btn').forEach(b=>b.classList.remove('active'));
btn.classList.add('active');
});
});
</script>
